# Base training config for SmolVLA LoRA fine-tuning on LIBERO-10
policy:
  type: smolvla
  pretrained_path: lerobot/smolvla_base
  device: cuda
  optimizer_lr: 1.0e-3
  scheduler_decay_lr: 1.0e-4
  load_vlm_weights: true
  push_to_hub: false

dataset:
  repo_id: lerobot/libero_10_image

env:
  type: libero

peft:
  method_type: LORA
  r: 64

batch_size: 32
steps: 50000
eval_freq: 0
save_freq: 2000
log_freq: 50
output_dir: outputs/train/base
job_name: smolvla_libero10_lora
num_workers: 8

wandb:
  enable: true
  project: smolvla-challenge
